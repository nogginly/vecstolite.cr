dependencies:
  brew:
    - crystal
  custom:
    - shards
hooks:
  before:
    - mkdir -p bin/release bin/debug
actions:
  build-release:
    command: SHARDS_BIN_PATH=bin/release shards build --release
    description: Build for release
    alias: br
  build-debug:
    command: SHARDS_BIN_PATH=bin/debug shards build --debug
    description: Build for development (debugging)
    aliases: [build, bd]
  run:
    command: crystal run
    description: Compile and run the source file
  clean:
    command: rm -rf bin/debug/* && rm -rf bin/release/*
    description: Clear prior builds
  wipe:
    command: crystal clear_cache && ops clean
    description: Clear build caches and prior builds
  lint:
    command: bin/ameba src/
    description: Run Crystal source linter (ameba)
  test:
    command: crystal spec -Dtest
    description: Run all tests (spectator)
